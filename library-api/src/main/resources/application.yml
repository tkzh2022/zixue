spring:
  profiles:
    active: dev
  application:
    name: library-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/library?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USER:library}
    password: ${DB_PASSWORD:library}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

library:
  jwt:
    secret: ${LIBRARY_JWT_SECRET:}
    access-ttl: PT15M
    refresh-ttl: P7D
    issuer: library-system
  rate-limit:
    enabled: true
  token-blacklist:
    type: caffeine
  cors:
    allowed-origins: ${LIBRARY_CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    root: INFO
    com.library: INFO
  pattern:
    level: '%5p [%X{traceId:-},%X{userId:-}]'
